services:
  mysql:
    image: mysql:8.0
    container_name: kpi_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: kpi_db
      MYSQL_USER: kpi_user
      MYSQL_PASSWORD: kpi_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kpi_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kpi_backend
    restart: unless-stopped
    ports:
      - "8000:8000"  # ТЕПЕРЬ ТАК: заходим через 80 порт, попадаем на 8000 в контейнере
    environment:
      APP_NAME: KPI-Intelligence
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000  # Убрали порт 8000 отсюда
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: kpi_db
      DB_USERNAME: kpi_user
      DB_PASSWORD: kpi_password
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: local
    volumes:
      - ./backend:/var/www          # ДОБАВЬ ЭТУ СТРОКУ (синхронизирует код)
      - backend_storage:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kpi_network

  frontend:
    build:
      context: ./frontend
      # ВАЖНО: Убедись, что используешь правильный Dockerfile для разработки
      dockerfile: Dockerfile 
    container_name: kpi_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Добавляем Volumes для Hot Reload
    volumes:
      - ./frontend:/app           # Синхронизируем папку с кодом
      - /app/node_modules         # Не даем локальным модулям перетереть контейнерные
    environment:
      - CHOKIDAR_USEPOLLING=true  # Обязательно для Linux/Docker, чтобы видеть изменения
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0         # Исправляет ошибки WebSocket в некоторых браузерах
    depends_on:
      - backend
    networks:
      - kpi_network
      
volumes:
  mysql_data:
  backend_storage:

networks:
  kpi_network:
    driver: bridge
